<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockView — 個人股票追蹤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    /* ── Variables ──────────────────────────────────── */
    :root {
      --bg: #0D0D0F;
      --surface: #161618;
      --surface-alt: #1C1C1F;
      --surface-hover: #222226;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #F0F0F2;
      --text-secondary: #9A9AA8;
      --text-tertiary: #55555E;
      --accent: #22C55E;
      --accent-rgb: 34,197,94;
      --positive: #22C55E;
      --positive-bg: rgba(34,197,94,0.08);
      --negative: #EF4444;
      --negative-bg: rgba(239,68,68,0.08);
      --neutral: #F59E0B;
      --blue: #3B82F6;
      --purple: #A78BFA;
      --nav-h: 60px;
    }

    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    canvas { display: block; }
    a { text-decoration: none; color: inherit; }

    /* ── Skeleton shimmer ───────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-alt) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    /* ── Nav ────────────────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(13,13,15,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: background .3s, border-color .3s;
    }
    .nav.scrolled { background: rgba(13,13,15,.97); border-color: rgba(255,255,255,.1); }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 100%; padding: 0 2rem;
      max-width: 1440px; margin: 0 auto;
    }
    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      display: flex; align-items: center; gap: .5rem;
    }
    .logo-dot {
      width: 7px; height: 7px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 8px rgba(var(--accent-rgb),.55);
    }
    .nav-right {
      display: flex; align-items: center; gap: 1.25rem;
    }
    .nav-meta {
      font-size: .73rem; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .nav-time { color: var(--text-secondary); }
    .refresh-btn {
      display: flex; align-items: center; gap: .375rem;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .35rem .75rem;
      font-size: .75rem; color: var(--text-secondary);
      transition: border-color .15s, color .15s;
    }
    .refresh-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .refresh-btn svg { width: 13px; height: 13px; }

    /* ── Layout ─────────────────────────────────────── */
    .dashboard {
      display: grid;
      grid-template-columns: 292px 1fr;
      max-width: 1440px; margin: 0 auto;
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.25rem 1.125rem;
      display: flex; flex-direction: column; gap: .875rem;
      position: sticky; top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto; overflow-x: hidden;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    /* ── Search ─────────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-field {
      display: flex; align-items: center; gap: .5rem;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .55rem .875rem;
      transition: border-color .15s;
    }
    .search-field:focus-within { border-color: var(--border-hover); }
    .search-field svg { width: 14px; height: 14px; color: var(--text-tertiary); flex-shrink: 0; }
    .search-field input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: .875rem; font-family: 'Inter', sans-serif;
    }
    .search-field input::placeholder { color: var(--text-tertiary); }
    .search-clear {
      background: transparent; border: none;
      color: var(--text-tertiary); font-size: 1rem; line-height: 1;
      padding: 0; display: none; transition: color .15s;
    }
    .search-clear:hover { color: var(--text); }
    .search-clear.show { display: block; }

    .search-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--surface-alt);
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      z-index: 300;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      overflow: hidden;
      display: none;
    }
    .search-dropdown.open { display: block; }
    .search-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .7rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: var(--surface-hover); }
    .si-ticker {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem; font-weight: 600;
      color: var(--accent); min-width: 52px;
    }
    .si-name {
      font-size: .8rem; color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .si-exch { font-size: .68rem; color: var(--text-tertiary); }
    .si-added {
      font-size: .7rem; padding: .2rem .5rem;
      border-radius: 5px; font-weight: 500;
    }
    .si-added.yes { background: var(--positive-bg); color: var(--positive); }
    .si-added.no  { background: var(--surface-hover); color: var(--text-tertiary); }
    .search-msg { padding: .875rem 1rem; font-size: .8rem; color: var(--text-tertiary); text-align: center; }

    /* ── Watchlist header ───────────────────────────── */
    .wl-header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); padding-bottom: .625rem;
    }
    .wl-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .73rem; font-weight: 700;
      color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em;
    }
    .wl-count {
      font-size: .68rem; font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary); background: var(--surface-alt);
      padding: .15rem .5rem; border-radius: 4px;
    }

    /* ── Stock list ─────────────────────────────────── */
    .stock-list { display: flex; flex-direction: column; gap: .575rem; }

    /* ── Stock card ────────────────────────────────── */
    .stock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: .875rem 1rem;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .2s;
      position: relative;
    }
    .stock-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: transparent;
      border-radius: 3px 0 0 3px;
      transition: background .2s;
    }
    .stock-card:hover { background: var(--surface-hover); border-color: var(--border-hover); transform: translateX(3px); }
    .stock-card.active { border-color: rgba(var(--accent-rgb),.28); background: rgba(var(--accent-rgb),.04); }
    .stock-card.active::before { background: var(--accent); }
    .stock-card.loading { pointer-events: none; }

    .card-row-a {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 2px;
    }
    .card-name {
      font-size: .875rem; font-weight: 600; color: var(--text);
      line-height: 1.3; flex: 1; margin-right: .5rem;
    }
    .card-price {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -.02em;
      white-space: nowrap;
    }
    .card-row-b {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .card-ticker {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; font-weight: 500;
      color: var(--text-tertiary); letter-spacing: .06em;
    }
    .card-change { font-size: .73rem; font-weight: 500; white-space: nowrap; }
    .card-change.pos { color: var(--positive); }
    .card-change.neg { color: var(--negative); }

    .card-rm {
      position: absolute; top: .5rem; right: .5rem;
      width: 18px; height: 18px; border-radius: 50%;
      border: none; background: transparent;
      color: var(--text-tertiary); font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s, background .15s, color .15s;
      line-height: 1;
    }
    .stock-card:hover .card-rm { opacity: 1; }
    .card-rm:hover { background: var(--negative-bg); color: var(--negative); }

    .wl-empty {
      text-align: center; padding: 1.5rem 0;
      color: var(--text-tertiary); font-size: .8125rem; line-height: 1.6;
    }
    .wl-empty span { display: block; font-size: 1.5rem; margin-bottom: .5rem; }

    /* ── Main content ────────────────────────────────── */
    .main-content {
      padding: 1.75rem 2rem;
      display: flex; flex-direction: column; gap: 1.375rem;
      position: relative;
    }

    .main-loading {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .875rem;
      background: var(--bg); border-radius: 0;
    }
    .main-loading p { font-size: .8125rem; color: var(--text-tertiary); }
    .main-loading.hide { display: none; }

    .main-error {
      text-align: center; padding: 3rem 2rem;
      color: var(--text-tertiary); font-size: .875rem;
    }
    .main-error .err-icon { font-size: 2rem; margin-bottom: .75rem; }
    .main-error strong { color: var(--text-secondary); display: block; margin-bottom: .5rem; }

    /* ── Stock header ────────────────────────────────── */
    .stock-header {
      display: flex; align-items: flex-end;
      justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .hd-left { display: flex; align-items: center; gap: .875rem; }
    .hd-icon {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
    }
    .hd-icon.tsla  { background: rgba(204,40,40,.15); color: #F87171; }
    .hd-icon.googl { background: rgba(66,133,244,.15); color: #60A5FA; }
    .hd-icon.msft  { background: rgba(0,188,242,.15); color: #38BDF8; }
    .hd-icon.default { background: var(--surface-alt); color: var(--text-secondary); }
    .hd-ticker { font-family: 'JetBrains Mono', monospace; font-size: .78rem; font-weight: 500; color: var(--text-tertiary); letter-spacing: .07em; }
    .hd-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--text); letter-spacing: -.01em; margin-top: 2px; }
    .hd-right { text-align: right; }
    .hd-price { font-family: 'Space Grotesk', sans-serif; font-size: 2.25rem; font-weight: 700; color: var(--text); letter-spacing: -.03em; line-height: 1; }
    .hd-change { font-size: .9375rem; font-weight: 500; margin-top: .3rem; }
    .hd-change.pos { color: var(--positive); }
    .hd-change.neg { color: var(--negative); }

    /* ── Stats row ───────────────────────────────────── */
    .stats-row { display: flex; gap: .625rem; flex-wrap: wrap; }
    .stat-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: .45rem .875rem;
      display: flex; flex-direction: column; gap: 2px;
    }
    .stat-l { font-size: .67rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }
    .stat-v { font-family: 'JetBrains Mono', monospace; font-size: .8125rem; font-weight: 500; color: var(--text); }

    /* ── Main grid ───────────────────────────────────── */
    .main-grid { display: grid; grid-template-columns: 1fr 330px; gap: 1.375rem; align-items: start; }
    .left-col  { display: flex; flex-direction: column; gap: 1.125rem; }
    .right-col { display: flex; flex-direction: column; gap: 1.125rem; }

    /* ── Card base ───────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
    }
    .card-title { font-size: .73rem; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .card-head { font-size: .875rem; font-weight: 600; color: var(--text); margin-bottom: .875rem; }

    /* ── Chart ───────────────────────────────────────── */
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.125rem; }
    .chart-controls { display: flex; align-items: center; gap: .5rem; }
    .bb-btn {
      padding: .25rem .6rem; border-radius: 6px;
      font-size: .72rem; font-weight: 600; letter-spacing: .04em;
      color: var(--text-tertiary); border: 1px solid var(--border);
      background: transparent;
      transition: color .15s, background .15s, border-color .15s;
    }
    .bb-btn:hover { color: var(--text-secondary); border-color: var(--border-hover); }
    .bb-btn.on {
      background: rgba(167,139,250,.12);
      color: var(--purple);
      border-color: rgba(167,139,250,.3);
    }
    .period-tabs { display: flex; gap: 2px; background: var(--surface-alt); padding: 3px; border-radius: 8px; }
    .period-tab {
      padding: .25rem .65rem; border-radius: 6px;
      font-size: .72rem; font-weight: 500;
      color: var(--text-tertiary); border: none; background: transparent;
      transition: color .15s, background .15s;
    }
    .period-tab.active { background: var(--surface-hover); color: var(--text); }
    .period-tab:hover:not(.active) { color: var(--text-secondary); }
    .chart-wrap { height: 268px; position: relative; }
    .chart-legend { display: flex; gap: 1rem; margin-top: .75rem; flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: .375rem; font-size: .695rem; color: var(--text-tertiary); }
    .leg-dot { width: 18px; height: 2px; border-radius: 1px; }

    /* ── Indicators (3×3) ────────────────────────────── */
    .ind-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: .625rem; }
    .ind-item {
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: 10px; padding: .8rem;
    }
    .ind-label { font-size: .67rem; color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; }
    .ind-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
    .ind-note { font-size: .67rem; color: var(--text-tertiary); margin-top: 2px; }
    .ind-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: .5rem; overflow: hidden; }
    .ind-fill { height: 100%; border-radius: 2px; width: 0; transition: width .9s cubic-bezier(.16,1,.3,1); }

    /* ── Recommendation ──────────────────────────────── */
    .score-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.125rem; }
    .score-circle { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .score-circle svg { transform: rotate(-90deg); }
    .sc-bg   { fill: none; stroke: var(--surface-alt); stroke-width: 5; }
    .sc-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(.16,1,.3,1); }
    .score-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem; font-weight: 700; color: var(--text);
    }
    .rec-badge {
      display: inline-flex; align-items: center;
      padding: .32rem .875rem; border-radius: 20px;
      font-size: .8rem; font-weight: 600; margin-bottom: .35rem;
    }
    .rec-badge.buy  { background: var(--positive-bg); color: var(--positive); border: 1px solid rgba(34,197,94,.2); }
    .rec-badge.hold { background: rgba(245,158,11,.1); color: var(--neutral); border: 1px solid rgba(245,158,11,.2); }
    .rec-badge.sell { background: var(--negative-bg); color: var(--negative); border: 1px solid rgba(239,68,68,.2); }
    .score-desc { font-size: .72rem; color: var(--text-tertiary); }
    .rec-reasoning {
      font-size: .8rem; color: var(--text-secondary); line-height: 1.68;
      margin-bottom: 1.125rem; padding: .875rem 1rem;
      background: var(--surface-alt); border-radius: 10px;
      border-left: 2px solid var(--border-hover);
    }
    .rec-factors { display: flex; flex-direction: column; gap: .5rem; }
    .factor-row { display: flex; align-items: center; justify-content: space-between; font-size: .8rem; }
    .factor-l { display: flex; align-items: center; gap: .5rem; color: var(--text-secondary); }
    .fdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .fdot.pos { background: var(--positive); }
    .fdot.neg { background: var(--negative); }
    .fdot.neu { background: var(--neutral); }
    .factor-v { font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--text-tertiary); text-align: right; }

    /* ── Buy signals ─────────────────────────────────── */
    .sig-divider { height: 1px; background: var(--border); margin: 1.125rem 0; }
    .sig-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .75rem;
    }
    .sig-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem; font-weight: 700;
      padding: .15rem .5rem; border-radius: 6px;
    }
    .sig-count.good { color: var(--positive); background: var(--positive-bg); }
    .sig-count.ok   { color: var(--neutral);  background: rgba(245,158,11,.1); }
    .sig-count.bad  { color: var(--negative); background: var(--negative-bg); }
    .sig-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .35rem;
    }
    .sig-item {
      display: flex; align-items: center; gap: .45rem;
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: 8px; padding: .45rem .625rem;
      transition: border-color .15s;
    }
    .sig-item.pass { border-color: rgba(34,197,94,.15); }
    .sig-item.fail { border-color: rgba(239,68,68,.1); }
    .sig-icon {
      width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 800;
    }
    .sig-icon.pass { background: var(--positive-bg); color: var(--positive); }
    .sig-icon.fail { background: var(--negative-bg); color: var(--negative); }
    .sig-icon.neu  { background: var(--surface-hover); color: var(--text-tertiary); }
    .sig-text { flex: 1; min-width: 0; }
    .sig-label { font-size: .72rem; color: var(--text-secondary); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sig-note  { font-family: 'JetBrains Mono', monospace; font-size: .65rem; color: var(--text-tertiary); display: block; }

    /* ── News chips ──────────────────────────────────── */
    .news-chips-wrap {
      display: flex; align-items: center; gap: .375rem;
      flex-wrap: wrap; margin-bottom: .75rem;
    }
    .news-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; font-weight: 600;
      padding: .2rem .55rem; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-alt); color: var(--text-tertiary);
      cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .news-chip:hover { border-color: var(--border-hover); color: var(--text-secondary); }
    .news-chip.active { color: var(--text); }
    .news-chip.all-chip { font-family: 'Inter', sans-serif; letter-spacing: 0; }
    .news-chip.all-chip.active { background: var(--surface-hover); border-color: var(--border-hover); }

    /* ── News ────────────────────────────────────────── */
    .news-list { display: flex; flex-direction: column; }
    .news-item {
      padding: .8rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity .15s;
    }
    .news-item:last-child { border-bottom: none; padding-bottom: 0; }
    .news-item:first-child { padding-top: 0; }

/* ═══════════════════════════════════════════════════════
   FINNHUB API
═══════════════════════════════════════════════════════ */
const API_KEY = 'd7if4d9r01qn2qatq0kgd7if4d9r01qn2qatq0l0';
const FH_BASE = 'https://finnhub.io/api/v1';

async function fh(path) {
  const sep = path.includes('?') ? '&' : '?';
  const r = await fetch(`${FH_BASE}${path}${sep}token=${API_KEY}`);
  if (!r.ok) throw new Error(`Finnhub ${r.status}: ${path}`);
  return await r.json();
}

async function fetchQuoteFH(symbol) {
  return await fh(`/quote?symbol=${symbol}`);
}

async function fetchProfile(symbol) {
  try { return await fh(`/stock/profile2?symbol=${symbol}`); }
  catch { return {}; }
}

async function fetchWithTimeout(url, ms = 7000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(id);
    return r;
  } catch(e) { clearTimeout(id); throw e; }
}

function parseYahooChart(d) {
  const res = d.chart?.result?.[0];
  if (!res) return null;
  const closes = res.indicators?.quote?.[0]?.close;
  const stamps  = res.timestamp;
  if (!closes?.length || !stamps?.length) return null;
  const c = [], t = [], h = [], l = [], v = [];
  closes.forEach((p, i) => {
    if (p != null) {
      c.push(+p.toFixed(2));
      t.push(stamps[i]);
      h.push(res.indicators.quote[0].high?.[i]   ?? p);
      l.push(res.indicators.quote[0].low?.[i]    ?? p);
      v.push(res.indicators.quote[0].volume?.[i] ?? 0);
    }
  });
  return c.length ? { c, t, h, l, v, s: 'ok' } : null;
}

async function fetchCandlesFinnhub(symbol) {
  try {
    const to   = Math.floor(Date.now() / 1000);
    const from = to - 366 * 24 * 3600;
    const d = await fh(`/stock/candle?symbol=${symbol}&resolution=D&from=${from}&to=${to}`);
    if (d.s !== 'ok' || !d.c?.length) return null;
    return { c: d.c, t: d.t, h: d.h || d.c, l: d.l || d.c, v: d.v || d.c.map(()=>0), s: 'ok' };
  } catch { return null; }
}

async function fetchCandlesYahoo(symbol) {
  const yUrl1 = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1y`;
  const yUrl2 = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1y`;
  const proxies = [
    () => fetchWithTimeout(yUrl1),
    () => fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(yUrl1)}`),
    () => fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(yUrl2)}`),
    () => fetchWithTimeout(`https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl1)}`),
    () => fetchWithTimeout(`https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl2)}`),
    () => fetchWithTimeout(`https://thingproxy.freeboard.io/fetch/${yUrl1}`),
  ];
  for (const attempt of proxies) {
    try {
      const r = await attempt();
      if (!r.ok) continue;
      const d = await r.json();
      const result = parseYahooChart(d);
      if (result) return result;
    } catch {}
  }
  return null;
}

async function fetchCandles(symbol) {
  // Try Finnhub first (uses existing API key, most reliable)
  const fhResult = await fetchCandlesFinnhub(symbol);
  if (fhResult) return fhResult;
  // Fall back to Yahoo Finance via CORS proxies
  const yhResult = await fetchCandlesYahoo(symbol);
  if (yhResult) return yhResult;
  // Return null instead of throwing — caller handles gracefully
  return null;
}

/* ═══════════════════════════════════════════════════════
   TECHNICAL CALCULATIONS
═══════════════════════════════════════════════════════ */
function calcSMA(prices, n) {
  return prices.map((_, i) =>
    i < n - 1 ? null : +(prices.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n).toFixed(2));
}

function calcRSI(prices, n = 14) {
  if (prices.length < n + 1) return null;
  let ag = 0, al = 0;
  for (let i = 1; i <= n; i++) {
    const d = prices[i] - prices[i-1];
    if (d >= 0) ag += d; else al -= d;
  }
  ag /= n; al /= n;
  for (let i = n + 1; i < prices.length; i++) {
    const d = prices[i] - prices[i-1];
    ag = (ag * (n-1) + Math.max(d, 0)) / n;
    al = (al * (n-1) + Math.max(-d,0)) / n;
  }
  if (al === 0) return 100;
  return +(100 - 100/(1 + ag/al)).toFixed(2);
}

function calcRSIArray(prices, n = 14) {
  if (prices.length < n + 1) return [];
  const rsis = [];
  let ag = 0, al = 0;
  for (let i = 1; i <= n; i++) {
    const d = prices[i] - prices[i-1];
    if (d >= 0) ag += d; else al -= d;
  }
  ag /= n; al /= n;
  rsis.push(al === 0 ? 100 : +(100 - 100/(1 + ag/al)).toFixed(2));
  for (let i = n + 1; i < prices.length; i++) {
    const d = prices[i] - prices[i-1];
    ag = (ag * (n-1) + Math.max(d, 0)) / n;
    al = (al * (n-1) + Math.max(-d, 0)) / n;
    rsis.push(al === 0 ? 100 : +(100 - 100/(1 + ag/al)).toFixed(2));
  }
  return rsis;
}

function calcEMA(prices, n) {
  const k = 2/(n+1);
  let ema = prices.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const out = new Array(n-1).fill(null);
  out.push(+ema.toFixed(4));
  for (let i = n; i < prices.length; i++) {
    ema = prices[i]*k + ema*(1-k);
    out.push(+ema.toFixed(4));
  }
  return out;
}

function calcMACD(prices) {
  if (prices.length < 35) return { macd: null, signal: null };
  const e12 = calcEMA(prices, 12);
  const e26 = calcEMA(prices, 26);
  const ml  = e12.map((v,i) => v!=null && e26[i]!=null ? +(v-e26[i]).toFixed(4) : null);
  const valid = ml.filter(v => v != null);
  if (valid.length < 9) return { macd: ml[ml.length-1], signal: null };
  const sig = calcEMA(valid, 9);
  return { macd: ml[ml.length-1], signal: sig[sig.length-1] };
}

function calcBollingerBands(prices, n = 20, k = 2) {
  const upper = [], lower = [], middle = [];
  for (let i = 0; i < prices.length; i++) {
    if (i < n - 1) { upper.push(null); lower.push(null); middle.push(null); continue; }
    const slice = prices.slice(i - n + 1, i + 1);
    const avg = slice.reduce((a,b) => a+b, 0) / n;
    const std = Math.sqrt(slice.reduce((s,v) => s + (v-avg)**2, 0) / n);
    upper.push(+(avg + k*std).toFixed(2));
    lower.push(+(avg - k*std).toFixed(2));
    middle.push(+avg.toFixed(2));
  }
  const cur = prices[prices.length - 1];
  const u = upper[upper.length - 1];
  const l = lower[lower.length - 1];
  const pctB = (u && l && u !== l) ? +((cur - l) / (u - l)).toFixed(3) : null;
  return { upper, lower, middle, pctB, upperVal: u, lowerVal: l };
}

function calcATR(highs, lows, closes, n = 14) {
  if (!highs || highs.length < n + 1) return null;
  const trs = [];
  for (let i = 1; i < highs.length; i++) {
    trs.push(Math.max(
      highs[i] - lows[i],
      Math.abs(highs[i] - closes[i-1]),
      Math.abs(lows[i]  - closes[i-1])
    ));
  }
  if (trs.length < n) return null;
  let atr = trs.slice(0, n).reduce((a,b) => a+b, 0) / n;
  for (let i = n; i < trs.length; i++) {
    atr = (atr * (n-1) + trs[i]) / n;
  }
  return +atr.toFixed(2);
}

function calcStochRSI(prices, n = 14, smooth = 3) {
  const rsiArr = calcRSIArray(prices, n);
  if (rsiArr.length < n) return null;
  const stochs = [];
  for (let i = n - 1; i < rsiArr.length; i++) {
    const slice = rsiArr.slice(i - n + 1, i + 1);
    const hi = Math.max(...slice);
    const lo = Math.min(...slice);
    stochs.push(hi === lo ? 50 : +((rsiArr[i] - lo) / (hi - lo) * 100).toFixed(2));
  }
  if (!stochs.length) return null;
  const recent = stochs.slice(-Math.min(smooth, stochs.length));
  return +(recent.reduce((a,b) => a+b) / recent.length).toFixed(1);
}

function buildAnalysis(prices, quote, highs, lows) {
  const cur = quote.regularMarketPrice;
  const rsi  = calcRSI(prices);
  const { macd, signal } = calcMACD(prices);
  const sma20 = calcSMA(prices, 20);
  const sma50 = calcSMA(prices, 50);
  const s20v  = sma20[sma20.length-1];
  const s50v  = sma50[sma50.length-1];
  const bb    = calcBollingerBands(prices);
  const atr   = calcATR(highs || prices, lows || prices, prices);
  const stochRSI = calcStochRSI(prices);

  // 5-day momentum
  const mom5 = prices.length >= 6
    ? +((prices[prices.length-1] - prices[prices.length-6]) / prices[prices.length-6] * 100).toFixed(2)
    : null;

  // Enhanced scoring (max ~95)
  let score = 50;
  if (rsi != null) {
    if (rsi < 30) score += 18; else if (rsi < 45) score += 8;
    else if (rsi <= 60) score += 3; else if (rsi > 80) score -= 18;
    else if (rsi > 70) score -= 10;
  }
  if (macd != null && signal != null) {
    if (macd > 0 && macd > signal) score += 14;
    else if (macd > 0) score += 4;
    else if (macd < 0 && macd < signal) score -= 14;
    else score -= 4;
  }
  if (s20v && s50v) {
    if (cur > s20v && cur > s50v) score += 14;
    else if (cur > s50v) score += 5;
    else if (cur < s20v && cur < s50v) score -= 14;
    else score -= 5;
  }
  if (s20v && s50v && s20v > s50v) score += 5;   // golden alignment bonus
  if (bb.pctB != null) {
    if (bb.pctB < 0.2) score += 8;
    else if (bb.pctB > 0.85) score -= 8;
  }
  if (stochRSI != null) {
    if (stochRSI < 20) score += 8;
    else if (stochRSI > 80) score -= 8;
  }
  if (mom5 != null && mom5 > 0) score += 3;

  score = Math.max(5, Math.min(95, Math.round(score)));
  const rec = score >= 65 ? 'buy' : score <= 38 ? 'sell' : 'hold';

  // Buy signals checklist
  const signals = [
    { l: 'RSI 健康', pass: rsi != null && rsi >= 30 && rsi <= 70,
      note: rsi != null ? `${rsi.toFixed(1)}` : 'N/A' },
    { l: 'MACD 金叉', pass: macd != null && signal != null && macd > signal,
      note: macd != null ? `${macd > 0 ? '+' : ''}${macd.toFixed(2)}` : 'N/A' },
    { l: '站上 SMA20', pass: s20v != null && cur > s20v,
      note: s20v ? `$${s20v}` : 'N/A' },
    { l: '站上 SMA50', pass: s50v != null && cur > s50v,
      note: s50v ? `$${s50v}` : 'N/A' },
    { l: '均線多頭', pass: s20v != null && s50v != null && s20v > s50v,
      note: s20v && s50v ? (s20v > s50v ? '排列正確' : '未排列') : 'N/A' },
    { l: 'BB 通道', pass: bb.pctB != null && bb.pctB >= 0.15 && bb.pctB <= 0.85,
      note: bb.pctB != null ? `%B ${(bb.pctB*100).toFixed(0)}%` : 'N/A' },
    { l: 'Stoch RSI', pass: stochRSI != null && stochRSI <= 80,
      note: stochRSI != null ? stochRSI.toFixed(0) : 'N/A' },
    { l: '短期動能', pass: mom5 != null && mom5 > 0,
      note: mom5 != null ? `${mom5 > 0 ? '+' : ''}${mom5}%` : 'N/A' },
  ];
  const passCount = signals.filter(s => s.pass).length;

  // Reasoning
  const parts = [];
  if (rsi != null) {
    if (rsi < 30) parts.push(`RSI 超賣 (${rsi.toFixed(1)})，存在反彈空間`);
    else if (rsi > 70) parts.push(`RSI 過熱 (${rsi.toFixed(1)})，注意回調風險`);
    else parts.push(`RSI 健康區間 (${rsi.toFixed(1)})`);
  }
  if (macd != null && signal != null)
    parts.push(macd > signal ? 'MACD 金叉持續' : 'MACD 呈現死叉');
  if (s50v)
    parts.push(cur > s50v ? `股價站上 SMA50 ($${s50v}) 支撐` : `股價低於 SMA50 ($${s50v}) 承壓`);
  if (bb.pctB != null) {
    if (bb.pctB < 0.2) parts.push('接近布林通道下軌，關注反彈機會');
    else if (bb.pctB > 0.8) parts.push('接近布林通道上軌，注意超買');
  }

  const factors = [
    { l:'RSI 指標', v: rsi!=null?rsi.toFixed(1):'N/A',
      n: rsi==null?'—':rsi<30?'超賣':rsi>70?'過熱':'健康',
      s: rsi==null?'neu':rsi<30?'pos':rsi>70?'neg':'pos' },
    { l:'MACD', v: macd!=null?(macd>0?'+':'')+macd.toFixed(2):'N/A',
      n: macd==null?'—':macd>signal?'金叉':'死叉',
      s: macd==null?'neu':macd>signal?'pos':'neg' },
    { l:'SMA 20', v: s20v?`$${s20v}`:'N/A', n: s20v?cur>s20v?'↑ 站上':'↓ 低於':'—',
      s: s20v?cur>s20v?'pos':'neg':'neu' },
    { l:'SMA 50', v: s50v?`$${s50v}`:'N/A', n: s50v?cur>s50v?'↑ 站上':'↓ 低於':'—',
      s: s50v?cur>s50v?'pos':'neg':'neu' },
    { l:'布林 %B', v: bb.pctB!=null?`${(bb.pctB*100).toFixed(0)}%`:'N/A',
      n: bb.pctB==null?'—':bb.pctB<0.2?'近下軌':bb.pctB>0.8?'近上軌':'中段',
      s: bb.pctB==null?'neu':bb.pctB<0.2?'pos':bb.pctB>0.8?'neg':'pos' },
    { l:'5日動能', v: mom5!=null?(mom5>0?'+':'')+mom5+'%':'N/A',
      n: mom5==null?'—':mom5>0?'↑ 上升':'↓ 下降',
      s: mom5==null?'neu':mom5>0?'pos':'neg' },
  ];

  return { score, rec, rsi, macd, signal, sma20: s20v, sma50: s50v,
    bb, atr, stochRSI, mom5, signals, passCount,
    reasoning: parts.length ? parts.join('，') + '。' : '分析中…', factors };
}

/* ═══════════════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════════════ */
async function loadStock(sym) {
  const [quoteFH, profile, candles, metrics, news] = await Promise.all([
    fetchQuoteFH(sym),
    fetchProfile(sym),
    fetchCandles(sym),
    fetchMetrics(sym),
    fetchNewsFH(sym),
  ]);

  // Require at least a valid quote price
  if (!quoteFH?.c) throw new Error(`No quote data: ${sym}`);

  const hasCandles = candles?.s === 'ok' && candles.c?.length >= 2;
  const prices = hasCandles ? candles.c.map(p => +p.toFixed(2)) : [quoteFH.pc, quoteFH.c].filter(Boolean);
  const highs  = hasCandles ? candles.h : null;
  const lows   = hasCandles ? candles.l : null;
  const dates  = hasCandles ? candles.t.map(t => new Date(t * 1000)) : [new Date()];
  const lastVol = candles?.v?.[candles.v.length - 1] || quoteFH.v || 0;

  const quote = {
    symbol:                    sym,
    shortName:                 profile.name || sym,
    regularMarketPrice:        quoteFH.c,
    regularMarketChange:       quoteFH.d  ?? 0,
    regularMarketChangePercent:quoteFH.dp ?? 0,
    regularMarketVolume:       lastVol,
    marketCap:                 (profile.marketCapitalization || 0) * 1e6,
    trailingPE:                metrics['peTTM'] || metrics['peNormalizedAnnual'] || null,
    fiftyTwoWeekHigh:          metrics['52WeekHigh'] || (hasCandles ? Math.max(...candles.h) : quoteFH.h) || quoteFH.c,
    fiftyTwoWeekLow:           metrics['52WeekLow']  || (hasCandles ? Math.min(...candles.l) : quoteFH.l) || quoteFH.c,
    exchange:                  profile.exchange || '',
  };

  cache[sym] = {
    quote,
    prices,
    highs,
    lows,
    vols:  candles?.v || [],
    dates,
    news,
    noChart: !hasCandles,
    analysis: buildAnalysis(prices, quote, highs, lows),
  };
}

async function loadAll() {
  if (watchlist.length === 0) return;
  showMainLoading('連接 Finnhub，載入即時數據…');
  try {
    await Promise.all(watchlist.map(s => loadStock(s).catch(e => {
      console.warn(`${s} failed:`, e);
      toast(`⚠ ${s} 載入失敗：${e.message}`, 'err');
    })));
  } finally {
    hideMainLoading();
    renderSidebar();
    if (!active) active = watchlist.find(s => cache[s]) || watchlist[0];
    if (active && cache[active]) {
      newsFilter = new Set([active]);
      renderMain(active);
    }
  }
}

async function refreshQuotes() {
  if (watchlist.length === 0) return;
  try {
    await Promise.all(
      watchlist.filter(s => cache[s]).map(async sym => {
        const q = await fetchQuoteFH(sym);
        cache[sym].quote = {
          ...cache[sym].quote,
          regularMarketPrice:         q.c,
          regularMarketChange:        q.d,
          regularMarketChangePercent: q.dp,
        };
        cache[sym].analysis = buildAnalysis(
          cache[sym].prices, cache[sym].quote,
          cache[sym].highs, cache[sym].lows
        );
      })
    );
    renderSidebar();
    if (active && cache[active]) {
      renderHeader(active);
      renderStats(active);
      renderIndicators(active);
      renderRec(active);
    }
    updateTime();
  } catch (e) { console.warn('Refresh failed:', e); }
}

/* ═══════════════════════════════════════════════════════
   RENDER — SIDEBAR
═══════════════════════════════════════════════════════ */
function renderSidebar() {
  const el = document.getElementById('stockList');
  document.getElementById('wlCount').textContent = `${watchlist.length} 檔`;

  if (watchlist.length === 0) {
    el.innerHTML = `<div class="wl-empty"><span>📋</span>持倉清單是空的<br>使用上方搜尋加入股票</div>`;
    return;
  }

  el.innerHTML = '';
  watchlist.forEach(sym => {
    const d = cache[sym];
    const card = document.createElement('div');
    card.className = 'stock-card' + (sym === active ? ' active' : '') + (d ? '' : ' loading');
    card.dataset.sym = sym;

    if (!d) {
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <div class="skeleton" style="height:14px;width:65%"></div>
          <div class="skeleton" style="height:14px;width:20%"></div>
        </div>
        <div class="skeleton" style="height:10px;width:40%;margin-bottom:10px"></div>
        <div class="skeleton" style="height:36px"></div>`;
    } else {
      const q   = d.quote;
      const pos = q.regularMarketChange >= 0;
      const shortName = q.shortName || sym;
      const col = stockColor(sym);
      card.innerHTML = `
        <button class="card-rm" data-rm="${sym}" title="移除">✕</button>
        <div class="card-row-a">
          <div class="card-name">${shortName}</div>
          <div class="card-price">$${q.regularMarketPrice.toFixed(2)}</div>
        </div>
        <div class="card-row-b">
          <div class="card-ticker">${sym}</div>
          <div class="card-change ${pos?'pos':'neg'}">${pos?'+':''}${q.regularMarketChangePercent.toFixed(2)}%</div>
        </div>`;
      card.style.setProperty('--card-color', col);
    }

    card.addEventListener('click', e => {
      if (e.target.closest('.card-rm')) return;
      pick(sym);
    });
    el.appendChild(card);
  });

  el.querySelectorAll('.card-rm').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      removeFromWL(btn.dataset.rm);
    });
  });
}

/* ── Header ── */
const iconCls = { TSLA:'tsla', GOOGL:'googl', MSFT:'msft' };
function renderHeader(sym) {
  const { quote } = cache[sym];
  const pos = quote.regularMarketChange >= 0;
  const icon = document.getElementById('hdIcon');
  icon.className = `hd-icon ${iconCls[sym] || 'default'}`;
  icon.textContent = sym.slice(0,2);
  document.getElementById('hdTicker').textContent  = sym;
  document.getElementById('hdName').textContent    = quote.shortName || sym;
  document.getElementById('hdPrice').textContent   = `$${quote.regularMarketPrice.toFixed(2)}`;
  const ch = document.getElementById('hdChange');
  ch.textContent = `${pos?'+':''}$${Math.abs(quote.regularMarketChange).toFixed(2)}`
    + `  (${pos?'+':''}${quote.regularMarketChangePercent.toFixed(2)}%)`;
  ch.className = `hd-change ${pos?'pos':'neg'}`;
}

/* ── Stats ── */

  document.getElementById('statsRow').innerHTML = [

/* ── Indicators (9 items, 3×3) ── */

  const { quote, prices, highs, lows, analysis } = cache[sym];
  const { rsi, macd, signal, sma20, sma50, bb, atr, stochRSI } = analysis;
  const cur = quote.regularMarketPrice;
  const rangePos = quote.fiftyTwoWeekHigh && quote.fiftyTwoWeekLow
    ? ((cur - quote.fiftyTwoWeekLow) / (quote.fiftyTwoWeekHigh - quote.fiftyTwoWeekLow) * 100)
    : 50;
  const pe = quote.trailingPE;

  const items = [
    { label:'RSI (14)', val: rsi!=null?rsi.toFixed(1):'N/A',
      note: rsi==null?'—':rsi<30?'超賣機會':rsi>70?'過熱警示':'健康區間',
      bar: rsi??50, barC: rsi==null?'var(--blue)':rsi>70?'var(--negative)':rsi<30?'var(--positive)':'var(--positive)',
      vC: rsi==null?'':rsi>70?'var(--negative)':rsi<30?'var(--positive)':'' },
    { label:'MACD', val: macd!=null?(macd>0?'+':'')+macd.toFixed(2):'N/A',
      note: macd==null?'—':macd>signal?'↑ 金叉':'↓ 死叉',
      bar: Math.min(Math.abs(macd||0)*15,100), barC: macd>signal?'var(--positive)':'var(--negative)',
      vC: macd==null?'':macd>signal?'var(--positive)':'var(--negative)' },
    { label:'SMA 20', val: sma20?`$${sma20}`:'N/A',
      note: sma20?cur>sma20?'↑ 站上均線':'↓ 低於均線':'—',
      bar: sma20?cur>sma20?72:28:50, barC: sma20&&cur>sma20?'var(--positive)':'var(--negative)' },
    { label:'SMA 50', val: sma50?`$${sma50}`:'N/A',
      note: sma50?cur>sma50?'↑ 站上均線':'↓ 低於均線':'—',
      bar: sma50?cur>sma50?68:26:50, barC: sma50&&cur>sma50?'var(--positive)':'var(--negative)' },
    { label:'52W 位置', val:`${rangePos.toFixed(0)}%`,
      note:`高：$${quote.fiftyTwoWeekHigh?.toFixed(0)||'—'}`,
      bar: rangePos, barC:'var(--blue)' },
    { label:'P/E 比率', val: pe?pe.toFixed(1):'N/A',
      note: pe?pe<20?'低估':pe<35?'合理':'偏高':'—',
      bar: pe?Math.min(pe/60*100,100):50,
      barC: pe?pe<20?'var(--positive)':pe<35?'var(--neutral)':'var(--negative)':'var(--blue)' },
    { label:'布林 %B', val: bb.pctB!=null?`${(bb.pctB*100).toFixed(0)}%`:'N/A',
      note: bb.pctB==null?'—':bb.pctB<0.2?'近下軌（機會）':bb.pctB>0.8?'近上軌（謹慎）':'帶內中段',
      bar: bb.pctB!=null?Math.min(Math.max(bb.pctB*100,0),100):50,
      barC: bb.pctB==null?'var(--blue)':bb.pctB<0.2?'var(--positive)':bb.pctB>0.8?'var(--negative)':'var(--blue)',
      vC: bb.pctB==null?'':bb.pctB>0.8?'var(--negative)':bb.pctB<0.2?'var(--positive)':'' },
    { label:'ATR (14)', val: atr?`$${atr}`:'N/A',
      note: atr&&cur?`波動率 ${(atr/cur*100).toFixed(1)}%`:'每日波動參考',
      bar: atr&&cur?Math.min(atr/cur*1000,100):50, barC:'var(--neutral)' },
    { label:'Stoch RSI', val: stochRSI!=null?stochRSI.toFixed(0):'N/A',
      note: stochRSI==null?'—':stochRSI<20?'超賣':stochRSI>80?'超買':'健康',
      bar: stochRSI??50, barC: stochRSI==null?'var(--blue)':stochRSI>80?'var(--negative)':stochRSI<20?'var(--positive)':'var(--positive)',
      vC: stochRSI==null?'':stochRSI>80?'var(--negative)':stochRSI<20?'var(--positive)':'' },
  ];

  document.getElementById('indGrid').innerHTML = items.map(x=>`
    <div class="ind-item">
      <div class="ind-label">${x.label}</div>
      <div class="ind-val" style="${x.vC?`color:${x.vC}`:''}">${x.val}</div>
      <div class="ind-note">${x.note}</div>
      <div class="ind-bar"><div class="ind-fill" data-w="${x.bar}" style="background:${x.barC}"></div></div>
    </div>`).join('');

  requestAnimationFrame(() => {
    document.querySelectorAll('.ind-fill').forEach(el => { el.style.width = el.dataset.w + '%'; });
  });
}

/* ── Recommendation + Buy Signals ── */
function renderRec(sym) {
  const { analysis } = cache[sym];
  const { score, rec, reasoning, factors, signals, passCount } = analysis;
  const scoreC = score>=65?'#22C55E':score>=50?'#F59E0B':'#EF4444';
  const labels  = { buy:'↑ 建議買入', hold:'→ 建議持有', sell:'↓ 建議賣出' };
  const descs   = { buy:'技術面偏強', hold:'信號混合，觀望', sell:'技術面偏弱' };

  const arc = document.getElementById('scoreArc');
  arc.style.stroke = scoreC;
  arc.style.strokeDashoffset = 188.5;
  setTimeout(() => { arc.style.strokeDashoffset = 188.5 * (1 - score/100); }, 80);
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDesc').textContent = descs[rec];

  const badge = document.getElementById('recBadge');
  badge.className = `rec-badge ${rec}`;
  badge.textContent = labels[rec];
  document.getElementById('recReasoning').textContent = reasoning;
  document.getElementById('recFactors').innerHTML = factors.map(f=>`
    <div class="factor-row">
      <div class="factor-l"><div class="fdot ${f.s}"></div>${f.l}</div>
      <span class="factor-v">${f.v} · ${f.n}</span>
    </div>`).join('');

  // Buy signals
  const countEl = document.getElementById('sigCount');
  countEl.textContent = `${passCount} / ${signals.length}`;
  countEl.className = 'sig-count ' + (passCount >= 6 ? 'good' : passCount >= 4 ? 'ok' : 'bad');

  document.getElementById('sigGrid').innerHTML = signals.map(s => {
    const cls = s.pass ? 'pass' : 'fail';
    return `<div class="sig-item ${cls}">
      <div class="sig-icon ${cls}">${s.pass ? '✓' : '✕'}</div>
      <div class="sig-text">
        <span class="sig-label">${s.l}</span>
        <span class="sig-note">${s.note}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── News with multi-stock chips ── */
function renderNewsChips() {
  const wrap = document.getElementById('newsChips');
  const loaded = watchlist.filter(s => cache[s]?.news?.length > 0);
  if (loaded.length <= 1) { wrap.innerHTML = ''; return; }

  let html = `<button class="news-chip all-chip${newsFilter.size === loaded.length ? ' active' : ''}" data-chip="ALL">全部</button>`;
  loaded.forEach(sym => {
    const col = stockColor(sym);
    const isActive = newsFilter.has(sym);
    html += `<button class="news-chip${isActive ? ' active' : ''}" data-chip="${sym}"
      style="${isActive ? `background:${col}18;color:${col};border-color:${col}40` : ''}">${sym}</button>`;
  });
  wrap.innerHTML = html;

  wrap.querySelectorAll('.news-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const sym = btn.dataset.chip;
      const loaded2 = watchlist.filter(s => cache[s]?.news?.length > 0);
      if (sym === 'ALL') {
        if (newsFilter.size === loaded2.length) {
          newsFilter = new Set([active]);
        } else {
          newsFilter = new Set(loaded2);
        }
      } else {
        if (newsFilter.has(sym) && newsFilter.size > 1) newsFilter.delete(sym);
        else newsFilter.add(sym);
      }
      renderNewsChips();
      renderNewsList();
    });
  });
}

function renderNewsList() {
  const el = document.getElementById('newsList');
  const stocks = newsFilter.size > 0 ? [...newsFilter] : (active ? [active] : []);
  const multiMode = stocks.length > 1;

  const allNews = stocks.flatMap(s =>
    (cache[s]?.news || []).map(n => ({ ...n, sym: s }))
  ).sort((a, b) => b.datetime - a.datetime);

  if (!allNews.length) {
    el.innerHTML = '<div class="search-msg">暫無近期新聞</div>';
    return;
  }

  el.innerHTML = allNews.map(n => {
    const ago = timeAgo(n.datetime);
    const col = stockColor(n.sym);
    const badge = multiMode
      ? `<span class="news-badge" style="background:${col}18;color:${col};border:1px solid ${col}30">${n.sym}</span>`
      : '';
    return `<a class="news-item" href="${n.url||'#'}" target="_blank" rel="noopener">
      <div class="news-meta">
        ${badge}
        <span class="news-src">${n.source||'—'}</span>
        <span class="news-sep">·</span>
        <span class="news-time">${ago}</span>
      </div>
      <div class="news-title">${n.headline||''}</div>
    </a>`;
  }).join('');
}

function renderNews() {
  renderNewsChips();
  renderNewsList();
}

/* ── Main Chart with optional Bollinger Bands ── */
function drawMainChart(sym, days) {
  const d = cache[sym];
  if (!d) return;

  if (d.noChart || d.prices.length < 5) {
    if (chart) { chart.destroy(); chart = null; }
    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('歷史 K 線暫時無法載入', canvas.width / 2, canvas.height / 2 - 10);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.font = '11px Inter, sans-serif';
    ctx.fillText('報價與技術指標仍正常顯示', canvas.width / 2, canvas.height / 2 + 14);
    return;
  }

  const prices = d.prices.slice(-days);
  const dates  = d.dates.slice(-days);
  const step   = Math.max(1, Math.floor(prices.length / 6));
  const labels = dates.map((dt, i) =>
    i % step === 0 ? dt.toLocaleDateString('zh-TW', {month:'short',day:'numeric'}) : '');
  const sm20 = calcSMA(prices, Math.min(20, prices.length));
  const sm50 = calcSMA(prices, Math.min(50, prices.length));
  const bb   = calcBollingerBands(prices);

  const expectedDS = showBB ? 5 : 3;

  // Fast update if dataset count matches
  if (chart && chart.data.datasets.length === expectedDS) {
    chart.data.labels          = labels;
    chart.data.datasets[0].data = prices;
    chart.data.datasets[1].data = sm20;
    chart.data.datasets[2].data = sm50;
    if (showBB) {
      chart.data.datasets[3].data = bb.upper;
      chart.data.datasets[4].data = bb.lower;
    }
    chart.update('active');
    return;
  }

  if (chart) { chart.destroy(); chart = null; }

  const ctx  = document.getElementById('priceChart').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 268);
  grad.addColorStop(0, 'rgba(59,130,246,.18)');
  grad.addColorStop(1, 'rgba(59,130,246,0)');

  const datasets = [
    { label:'股價', data: prices,
      borderColor:'#3B82F6', borderWidth:2,
      fill:true, backgroundColor:grad, tension:.3,
      pointRadius:0, pointHoverRadius:5,
      pointHoverBackgroundColor:'#fff', pointHoverBorderColor:'#3B82F6' },
    { label:'SMA20', data:sm20, borderColor:'rgba(245,158,11,.8)',
      borderWidth:1.5, borderDash:[5,4], fill:false, tension:.3, pointRadius:0 },
    { label:'SMA50', data:sm50, borderColor:'rgba(167,139,250,.8)',
      borderWidth:1.5, borderDash:[5,4], fill:false, tension:.3, pointRadius:0 },
  ];

  if (showBB) {
    datasets.push(
      { label:'BB上軌', data:bb.upper, borderColor:'rgba(52,211,153,.4)',
        borderWidth:1, borderDash:[3,5], fill:false, tension:.3, pointRadius:0 },
      { label:'BB下軌', data:bb.lower, borderColor:'rgba(52,211,153,.4)',
        borderWidth:1, borderDash:[3,5], fill:'-1',
        backgroundColor:'rgba(52,211,153,.03)', tension:.3, pointRadius:0 }
    );
  }

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: {
        legend:{ display:false },
        tooltip:{
          backgroundColor:'#1C1C1F', borderColor:'rgba(255,255,255,.1)',
          borderWidth:1, titleColor:'#9A9AA8', bodyColor:'#F0F0F2',
          padding:10, cornerRadius:8,
          callbacks:{ label: c => c.raw!=null ? ` ${c.dataset.label}: $${c.raw.toFixed(2)}` : null }
        }
      },
      scales: {
        x:{ grid:{ color:'rgba(255,255,255,.03)', drawTicks:false },
          ticks:{ color:'#55555E', font:{ family:"'JetBrains Mono'", size:10 }, maxRotation:0 },
          border:{ color:'rgba(255,255,255,.06)' } },
        y:{ position:'right',
          grid:{ color:'rgba(255,255,255,.04)', drawTicks:false },
          ticks:{ color:'#55555E', font:{ family:"'JetBrains Mono'", size:10 }, callback: v=>'$'+v.toFixed(0) },
          border:{ color:'transparent' } }
      }
    }
  });

  // Update legend
  const leg = document.getElementById('chartLegend');
  leg.innerHTML = `
    <div class="leg-item"><div class="leg-dot" style="background:#3B82F6"></div>股價</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(245,158,11,.8)"></div>SMA20</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(167,139,250,.8)"></div>SMA50</div>
    ${showBB ? '<div class="leg-item"><div class="leg-dot" style="background:rgba(52,211,153,.6)"></div>布林通道</div>' : ''}`;
}

/* ═══════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════ */
function pick(sym) {
  if (sym === active) return;
  active = sym;
  newsFilter = new Set([sym]);
  document.querySelectorAll('.stock-card').forEach(c =>
    c.classList.toggle('active', c.dataset.sym === sym));
  if (chart) { chart.destroy(); chart = null; }

  if (!cache[sym]) {
    showMainLoading(`載入 ${sym}…`);
    loadStock(sym).then(() => {
      hideMainLoading();
      renderMain(sym);
    }).catch(e => {
      hideMainLoading();
      toast(`⚠ 無法載入 ${sym}`, 'err');
    });
    return;
  }

  gsap.to('#mainContent > *:not(#mainLoading)', {
    opacity:0, y:-8, duration:.13, stagger:.025,
    onComplete: () => {
      renderMain(sym);
      gsap.fromTo('#mainContent > *:not(#mainLoading)',
        { opacity:0, y:14 }, { opacity:1, y:0, duration:.32, stagger:.05, ease:'power2.out' });
    }
  });
}

async function addToWL(sym, shortName) {
  if (watchlist.includes(sym)) {
    toast(`${sym} 已在清單中`, 'ok');
    return;
  }
  watchlist.push(sym);
  saveWL();
  document.getElementById('wlCount').textContent = `${watchlist.length} 檔`;
  renderSidebar();
  try {
    await loadStock(sym);
    toast(`✓ 已加入 ${shortName || sym}`, 'ok');
  } catch(e) {
    toast(`⚠ 無法載入 ${sym} 數據`, 'err');
  }
  renderSidebar();
  if (active && cache[active]) renderNews();
}

function removeFromWL(sym) {
  if (!confirm(`確定要從清單移除 ${sym}？`)) return;
  watchlist = watchlist.filter(s => s !== sym);
  saveWL();
  newsFilter.delete(sym);
  if (newsFilter.size === 0 && active !== sym) newsFilter.add(active);

  if (active === sym) {
    if (chart) { chart.destroy(); chart = null; }
    active = watchlist[0] || null;
    if (active) newsFilter = new Set([active]);
  }

  renderSidebar();
  if (active && cache[active]) renderMain(active);
  else if (!active) {
    document.getElementById('hdName').textContent = '請選擇股票';
    document.getElementById('hdPrice').textContent = '—';
    document.getElementById('hdChange').textContent = '';
    document.getElementById('statsRow').innerHTML = '';
    document.getElementById('indGrid').innerHTML = '';
    document.getElementById('sigGrid').innerHTML = '';
    document.getElementById('newsList').innerHTML = '';
    document.getElementById('newsChips').innerHTML = '';
  }
}

/* ═══════════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════════ */
let searchTimer = null;
const searchInput    = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const searchClear    = document.getElementById('searchClear');
const searchMsg      = document.getElementById('searchMsg');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.classList.toggle('show', q.length > 0);
  clearTimeout(searchTimer);
  if (!q) { closeDropdown(); return; }
  searchMsg.textContent = '搜尋中…';
  searchDropdown.classList.add('open');
  searchDropdown.innerHTML = '<div class="search-msg">搜尋中…</div>';
  searchTimer = setTimeout(() => doSearch(q), 320);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDropdown(); searchInput.blur(); }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('show');
  closeDropdown();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) closeDropdown();
});

function closeDropdown() { searchDropdown.classList.remove('open'); }

async function doSearch(q) {
  try {
    const results = await searchFH(q);
    if (!results.length) {
      searchDropdown.innerHTML = '<div class="search-msg">找不到相關股票</div>';
      return;
    }
    searchDropdown.innerHTML = results.map(r => {
      const inList = watchlist.includes(r.symbol);
      return `<div class="search-item" data-sym="${r.symbol}" data-name="${r.description||r.symbol}">
        <span class="si-ticker">${r.displaySymbol || r.symbol}</span>
        <span class="si-name">${r.description || '—'}</span>
        <span class="si-exch">${r.type||''}</span>
        <span class="si-added ${inList?'yes':'no'}">${inList?'已加入':'+ 加入'}</span>
      </div>`;
    }).join('');

    searchDropdown.querySelectorAll('.search-item').forEach(el => {
      el.addEventListener('click', () => {
        const sym  = el.dataset.sym;
        const name = el.dataset.name;
        closeDropdown();
        searchInput.value = '';
        searchClear.classList.remove('show');
        addToWL(sym, name);
      });
    });
  } catch(e) {
    searchDropdown.innerHTML = '<div class="search-msg">搜尋失敗，請稍後再試</div>';
  }
}

/* ═══════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════ */
function showMainLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || '載入中…';
  document.getElementById('mainLoading').classList.remove('hide');
}
function hideMainLoading() {
  document.getElementById('mainLoading').classList.add('hide');
}

function toast(msg, type = '') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function updateTime() {
  document.getElementById('navTime').textContent =
    new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
}

function fmtCap(n) {
  if (!n) return 'N/A';
  if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return (n/1e9).toFixed(1)  + 'B';
  return (n/1e6).toFixed(0) + 'M';
}
function fmtVol(n) {
  if (!n) return 'N/A';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return n.toLocaleString();
}
function timeAgo(ts) {
  if (!ts) return '—';
  const s = Math.floor(Date.now()/1000) - ts;
  if (s < 3600)  return `${Math.floor(s/60)}m 前`;
  if (s < 86400) return `${Math.floor(s/3600)}h 前`;
  return `${Math.floor(s/86400)}d 前`;
}

/* ═══════════════════════════════════════════════════════
   AI NEWS SUMMARY
═══════════════════════════════════════════════════════ */
let aiSummaries = {};

async function fetchAISummary(sym, headlines) {
  const key = localStorage.getItem('sv_groq_key');
  if (!key) return null;
  const headlineText = headlines.slice(0, 8).map((h, i) => `${i+1}. ${h}`).join('\n');
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      messages: [{
        role: 'user',
        content: `以下是 ${sym} 的近期新聞標題，請用繁體中文寫 2~3 句話，簡潔摘要這些新聞對該股票的影響或市場情緒，不需要列出標題，直接給出摘要段落。\n\n${headlineText}`
      }],
      max_tokens: 200,
      temperature: 0.5
    })
  });
  if (!resp.ok) throw new Error(`Groq ${resp.status}`);
  const data = await resp.json();
  return data.choices?.[0]?.message?.content?.trim() || null;
}

function renderAISummaries() {
  const el = document.getElementById('aiSumList');
  const stocks = newsFilter.size > 0 ? [...newsFilter] : (active ? [active] : []);
  if (!stocks.length) { el.style.display = 'none'; return; }

  el.style.display = 'flex';
  el.innerHTML = stocks.map(sym => {
    const col = stockColor(sym);
    const text = aiSummaries[sym];
    const isLoading = text === '__loading__';
    const displayText = isLoading ? '正在分析中…' : (text || '無法取得摘要');
    return `<div class="ai-sum-block" style="border-left-color:${col}">
      <span class="ai-sum-ticker" style="color:${col};border-color:${col}40;background:${col}18">${sym}</span>
      <p class="ai-sum-text${isLoading ? ' loading' : ''}">${displayText}</p>
    </div>`;
  }).join('');
}

async function generateSummaries() {
  const btn = document.getElementById('aiSumBtn');
  const key = localStorage.getItem('sv_groq_key');
  if (!key) {
    document.getElementById('aiKeyBar').style.display = 'flex';
    return;
  }

  const stocks = newsFilter.size > 0 ? [...newsFilter] : (active ? [active] : []);
  if (!stocks.length) return;

  btn.disabled = true;
  btn.innerHTML = `<span class="ai-spark">✦</span> 分析中…`;
  aiSummaries = {};
  stocks.forEach(s => { aiSummaries[s] = '__loading__'; });
  renderAISummaries();

  await Promise.all(stocks.map(async sym => {
    const news = cache[sym]?.news || [];
    const headlines = news.map(n => n.headline).filter(Boolean);
    if (!headlines.length) { aiSummaries[sym] = '目前無新聞資料'; return; }
    try {
      aiSummaries[sym] = await fetchAISummary(sym, headlines) || '無法取得摘要';
    } catch(e) {
      aiSummaries[sym] = e.message?.includes('401') ? 'API Key 無效，請重新設定' : '摘要失敗，請稍後再試';
    }
    renderAISummaries();
  }));

  btn.disabled = false;
  btn.innerHTML = `<span class="ai-spark">✦</span> 重新摘要`;
}

function updateAIKeyDot() {
  const hasKey = !!localStorage.getItem('sv_groq_key');
  const dot = document.getElementById('aiKeyDot');
  if (dot) dot.style.display = hasKey ? 'inline-block' : 'none';
}

/* ═══════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════ */
document.getElementById('periodTabs').addEventListener('click', e => {
  const btn = e.target.closest('.period-tab');
  if (!btn) return;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  period = +btn.dataset.p;
  if (chart) { chart.destroy(); chart = null; }
  if (active && cache[active]) drawMainChart(active, period);
});

document.getElementById('bbToggle').addEventListener('click', () => {
  showBB = !showBB;
  document.getElementById('bbToggle').classList.toggle('on', showBB);
  if (chart) { chart.destroy(); chart = null; }
  if (active && cache[active]) drawMainChart(active, period);
});

document.getElementById('refreshBtn').addEventListener('click', async () => {
  document.getElementById('refreshBtn').textContent = '刷新中…';
  await refreshQuotes();
  document.getElementById('refreshBtn').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>刷新`;
});

document.getElementById('aiSumBtn').addEventListener('click', generateSummaries);

document.getElementById('aiKeySave').addEventListener('click', () => {
  const val = document.getElementById('aiKeyInput').value.trim();
  if (val) {
    localStorage.setItem('sv_groq_key', val);
    document.getElementById('aiKeyBar').style.display = 'none';
    document.getElementById('aiKeyInput').value = '';
    updateAIKeyDot();
    generateSummaries();
  }
});

window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
gsap.registerPlugin();
updateTime();
updateAIKeyDot();
setInterval(updateTime, 30000);
setInterval(refreshQuotes, 60000);

loadAll();
</script>
